services:
  - type: web
    name: agendamento-backend
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agendamento-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://agendamento-online.vercel.app
      - key: NODE_ENV
        value: production

databases:
  - name: agendamento-db
    plan: free
